<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baralho Metacognitivo</title>
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  text-align:center;
  background:#f4f6f8;
}

.tela {
  width:90%;
  max-width:400px;
}

button {
  padding:15px;
  width:100%;
  margin-top:15px;
  font-size:18px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="tela" id="app"></div>

<script>

let estado = "inicio";
let tempo = 0;

// ---------------- RENDER ----------------
function render() {

  if (estado === "inicio") {
    app.innerHTML = `
      <h2>📘 Início</h2>
      <input id="assunto" placeholder="Assunto"><br>
      <input id="tempo" type="number" placeholder="Tempo (min)"><br>
      <button onclick="irPlanejamento()">Iniciar</button>
    `;
  }

  if (estado === "planejamento") {
    app.innerHTML = `
      <h2>🟦 Planejamento</h2>
      <p>Selecione uma carta</p>
      <button onclick="scanQR()">📷 Ler Carta</button>
      <button onclick="iniciarTimer()">Continuar</button>
      <div id="reader"></div>
      <p id="carta"></p>
    `;
  }

  if (estado === "monitoramento") {
    app.innerHTML = `
      <h2>🟨 Monitoramento</h2>
      <button onclick="monitor('ok')">✔ Satisfatório</button>
      <button onclick="monitor('parcial')">⚠️ Parcial</button>
      <button onclick="monitor('ruim')">❌ Insatisfatório</button>
    `;
  }

  if (estado === "avaliacao") {
    app.innerHTML = `
      <h2>🟩 Avaliação</h2>
      <button onclick="avaliar('sim')">✔ Atingiu</button>
      <button onclick="avaliar('nao')">❌ Não atingiu</button>
    `;
  }

  if (estado === "reflexao") {
    app.innerHTML = `
      <h2>🧠 Reflexão</h2>
      <p id="pergunta"></p>
      <button onclick="reiniciar()">Novo ciclo</button>
    `;
  }
}

// ---------------- FLUXO ----------------

function irPlanejamento() {
  tempo = document.getElementById("tempo").value * 60000;
  estado = "planejamento";
  render();
}

function iniciarTimer() {
  estado = "espera";
  setTimeout(() => {
    estado = "monitoramento";
    render();
  }, tempo);
}

// ---------------- MONITORAMENTO ----------------

function monitor(resp) {
  if (resp === "parcial" || resp === "ruim") {
    iniciarTimer(); // repete tempo
  } else {
    estado = "avaliacao";
    render();
  }
}

// ---------------- AVALIAÇÃO ----------------

function avaliar(resp) {
  gerarReflexao(resp);
}

// ---------------- REFLEXÃO ----------------

function gerarReflexao(resp) {

  let perguntas = [];

  if (resp === "sim") {
    perguntas = [
      "Sua compreensão é profunda ou superficial?",
      "Você consegue explicar com segurança?",
      "Existem lacunas não percebidas?"
    ];
  } else {
    perguntas = [
      "O que você faria diferente?",
      "O que precisa revisar primeiro?",
      "Qual é o próximo passo?"
    ];
  }

  let p = perguntas[Math.floor(Math.random() * perguntas.length)];

  estado = "reflexao";
  render();

  setTimeout(() => {
    document.getElementById("pergunta").innerText = p;

    let fala = new SpeechSynthesisUtterance(p);
    speechSynthesis.speak(fala);
  }, 100);
}

// ---------------- RESET ----------------

function reiniciar() {
  estado = "inicio";
  render();
}

// ---------------- QR ----------------

function scanQR() {
  const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });

  scanner.render((texto) => {
    document.getElementById("carta").innerText = texto;

    let fala = new SpeechSynthesisUtterance(texto);
    speechSynthesis.speak(fala);

    scanner.clear();
  });
}

// ---------------- SERVICE WORKER ----------------

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

render();

</script>

</body>
</html>
