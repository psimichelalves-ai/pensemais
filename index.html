<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baralho Metacognitivo</title>

<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
  --fontSize: 18px;
}

body {
  margin:0;
  font-family: Arial;
  font-size: var(--fontSize);
  background:#1e3c72;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container {
  width:100%;
  max-width:420px;
  text-align:center;
}

.card {
  width:80%;
  margin:auto;
  padding:30px;
  border-radius:20px;
  min-height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  cursor:pointer;
}

button {
  width:80%;
  padding:15px;
  margin:10px auto;
  display:block;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  color:white;
}

.planejamento { background:#4A90E2; }
.monitoramento { background:#F5A623; }
.avaliacao { background:#7ED321; }
.reflexao { background:#8E44AD; }

.progress {
  width:80%;
  height:6px;
  background:#ccc;
  margin:10px auto;
  border-radius:5px;
  overflow:hidden;
}

.progress-bar {
  height:100%;
  width:0%;
  background:white;
}
</style>
</head>

<body>

<div class="container">
  <div id="app"></div>
</div>

<script>

// ---------------- ESTADO ----------------

let estado = "inicio";
let tempoTotal = 10 * 60000;
let tempoAtual = 0;
let intervalo = null;
let repetiu = false;

let score = {
  monitoramento: "",
  avaliacao: ""
};

// ---------------- RENDER ----------------

function render() {

  if (estado === "inicio") {
    app.innerHTML = `
      <h2>⚙️ Configuração</h2>

      <p>Tamanho da fonte</p>
      <input type="range" min="14" max="28" value="18"
        onchange="document.documentElement.style.setProperty('--fontSize', this.value + 'px')">

      <p>Tempo: <span id="tempoLabel">5 min</span></p>
      <input type="range" min="1" max="20" value="5"
        onchange="definirTempo(this.value)">

      <button class="planejamento" onclick="irPlanejamento()">Iniciar</button>
    `;
  }

  if (estado === "planejamento") telaCard("🟦 Planejamento", "planejamento");
  if (estado === "monitoramento") telaCard("🟨 Monitoramento", "monitoramento");
  if (estado === "avaliacao") telaCard("🟩 Avaliação", "avaliacao");

  if (estado === "reflexao") {
    app.innerHTML = `
      <h2>🧠 Reflexão</h2>
      <div class="card reflexao">
        <p id="pergunta"></p>
      </div>
      <button onclick="mostrarScore()">Continuar</button>
    `;
  }

  if (estado === "score") {
    app.innerHTML = `
      <h2>🏆 Resultado</h2>
      <p>Monitoramento: ${score.monitoramento}</p>
      <p>Avaliação: ${score.avaliacao}</p>
      <button onclick="reiniciar()">Novo ciclo</button>
    `;
  }
}

// ---------------- TELA PADRÃO ----------------

function telaCard(titulo, classe) {
  app.innerHTML = `
    <h2>${titulo}</h2>

    <div class="progress">
      <div class="progress-bar" id="barra"></div>
    </div>

    <div class="card ${classe}" onclick="iniciarInteracao()">
      <p id="mensagem">Clique para escolher uma carta</p>
    </div>

    <button onclick="scanQR()">📷 Ler QR Code</button>

    ${estado === "monitoramento" ? `
      <button onclick="respostaMonitoramento('ok')">✔ Satisfatório</button>
      <button onclick="respostaMonitoramento('parcial')">⚠️ Parcial</button>
      <button onclick="respostaMonitoramento('ruim')">❌ Insatisfatório</button>
    ` : ""}

    ${estado === "avaliacao" ? `
      <button onclick="avaliar('sim')">✔ Atingiu</button>
      <button onclick="avaliar('nao')">❌ Não atingiu</button>
    ` : ""}
  `;
}

// ---------------- CONTROLE ----------------

function definirTempo(min) {
  document.getElementById("tempoLabel").innerText = min + " min";
  tempoTotal = min * 60000;
}

function irPlanejamento() {
  estado = "planejamento";
  render();
}

// ---------------- INTERAÇÃO ----------------

function iniciarInteracao() {
  document.getElementById("mensagem").innerText = "";
  iniciarTimer();
}

// ---------------- TIMER ----------------

function iniciarTimer() {
  tempoAtual = 0;

  clearInterval(intervalo);

  intervalo = setInterval(() => {
    tempoAtual += 100;

    let progresso = (tempoAtual / tempoTotal) * 100;
    let barra = document.getElementById("barra");

    if (barra) barra.style.width = progresso + "%";

    if (tempoAtual >= tempoTotal) {
      clearInterval(intervalo);

      if (estado === "planejamento") {
        estado = "monitoramento";
      } else if (estado === "monitoramento") {
        estado = "avaliacao";
      }

      render();
    }

  }, 100);
}

// ---------------- MONITORAMENTO ----------------

function respostaMonitoramento(resp) {

  score.monitoramento = resp;

  if ((resp === "parcial" || resp === "ruim") && !repetiu) {
    repetiu = true;
    iniciarTimer();
  } else {
    estado = "avaliacao";
    render();
  }
}

// ---------------- AVALIAÇÃO ----------------

function avaliar(resp) {
  score.avaliacao = resp;
  gerarReflexao(resp);
}

// ---------------- REFLEXÃO ----------------

function gerarReflexao(resp) {

  let perguntas = resp === "sim"
    ? [
      "Sua compreensão é profunda ou superficial?",
      "Você consegue explicar com segurança?",
      "Existem lacunas não percebidas?",
      "Há partes ainda pouco claras?"
    ]
    : [
      "O que você faria diferente?",
      "O que precisa revisar primeiro?",
      "O que ainda precisa aprender?",
      "Qual é o próximo passo?"
    ];

  let p = perguntas[Math.floor(Math.random() * perguntas.length)];

  estado = "reflexao";
  render();

  setTimeout(() => {
    document.getElementById("pergunta").innerText = p;

    let fala = new SpeechSynthesisUtterance(p);
    speechSynthesis.speak(fala);
  }, 100);
}

// ---------------- SCORE ----------------

function mostrarScore() {
  estado = "score";
  render();
}

// ---------------- RESET ----------------

function reiniciar() {
  repetiu = false;
  score = { monitoramento: "", avaliacao: "" };
  estado = "inicio";
  render();
}

// ---------------- QR CODE ----------------

function scanQR() {

  const scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
  });

  scanner.render((texto) => {

    let msg = document.getElementById("mensagem");

    if (msg) msg.innerText = texto;

    let fala = new SpeechSynthesisUtterance(texto);
    speechSynthesis.speak(fala);

    scanner.clear();
  });
}

// ---------------- SERVICE WORKER ----------------

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

// ---------------- START ----------------

render();

</script>

</body>
</html>
