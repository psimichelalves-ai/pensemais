<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baralho Metacognitivo2</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --fontSize: 18px; }

body {
  margin:0;
  font-family: Arial;
  font-size: var(--fontSize);
  background:#1e3c72;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container { width:100%; max-width:420px; text-align:center; }

.card {
  width:80%;
  margin:auto;
  padding:30px;
  border-radius:20px;
  min-height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

button {
  width:80%;
  padding:15px;
  margin:10px auto;
  display:block;
  border:none;
  border-radius:10px;
  font-weight:bold;
  color:white;
}

.planejamento { background:#4A90E2; }
.monitoramento { background:#F5A623; }
.avaliacao { background:#7ED321; }
.reflexao { background:#8E44AD; }

.progress {
  width:80%;
  height:6px;
  background:#ccc;
  margin:10px auto;
  border-radius:5px;
}

.bar { height:100%; width:0%; background:white; }
</style>
</head>

<body>

<div class="container">
  <div id="app"></div>
</div>

<script>

// ---------------- ESTADO ----------------

let estado = "inicio";
let tempoTotal = parseInt(localStorage.getItem("tempo")) || 600000;
let vozAtiva = localStorage.getItem("voz") === "true";

let tempoAtual = 0;
let intervalo;

let tentativa = 0;
let cardIniciado = false;

let score = { monitoramento:"", avaliacao:"" };

// ---------------- VOZ ----------------

function falar(txt){
  if(!vozAtiva) return;
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(txt));
}

// ---------------- RENDER ----------------

function render(){

if(estado==="inicio"){
  app.innerHTML = `
    <h2>⚙️ Configuração</h2>

    <button onclick="toggleVoz()">
      🔊 Leitura: ${vozAtiva ? "Ativada" : "Desativada"}
    </button>

    <p>Fonte</p>
    <input type="range" min="14" max="28" value="${localStorage.getItem('fonte')||18}"
    onchange="setFonte(this.value)">

    <p>Tempo: <span id="tempoLabel">${tempoTotal/60000} min</span></p>
    <input type="range" min="1" max="20" value="${tempoTotal/60000}"
    onchange="setTempo(this.value)">

    <button class="planejamento" onclick="irPlanejamento()">Iniciar</button>
  `;

  falar("Tela de configuração");
}

else if(["planejamento","monitoramento","avaliacao"].includes(estado)){
  telaCard();
}

else if(estado==="reflexao"){
  let p = gerarPergunta();

  app.innerHTML=`
    <h2>🧠 Reflexão</h2>
    <div class="card reflexao">${p}</div>
    <button onclick="irScore()">Continuar</button>
  `;

  falar(p);
}

else if(estado==="score"){
  app.innerHTML=`
    <h2>🏆 Resultado</h2>
    <p>Monitoramento: ${score.monitoramento}</p>
    <p>Avaliação: ${score.avaliacao}</p>
    <button onclick="reiniciar()">Novo ciclo</button>
  `;
}

}

// ---------------- CONFIG ----------------

function toggleVoz(){
  vozAtiva = !vozAtiva;
  localStorage.setItem("voz", vozAtiva);
  render();
}

function setFonte(v){
  document.documentElement.style.setProperty('--fontSize', v+"px");
  localStorage.setItem("fonte", v);
}

function setTempo(v){
  tempoTotal = v * 60000;
  localStorage.setItem("tempo", tempoTotal);
  document.getElementById("tempoLabel").innerText = v+" min";
}

// ---------------- FLUXO ----------------

function irPlanejamento(){
  estado="planejamento";
  tentativa=0;
  cardIniciado=false;
  render();
}

// ---------------- CARD ----------------

function telaCard(){

  let cor = estado;

  app.innerHTML=`
    <h2>${estado.toUpperCase()}</h2>

    <div class="progress">
      <div class="bar" id="barra"></div>
    </div>

    <div class="card ${cor}" onclick="iniciarCard()">
      <p id="msg">Clique para escolher uma carta</p>
    </div>

    <button onclick="scanQR()">📷 Ler QR</button>

    ${estado==="monitoramento" ? `
      <button onclick="responder('ok')">✔ Satisfatório</button>
      <button onclick="responder('parcial')">⚠️ Parcial</button>
      <button onclick="responder('ruim')">❌ Insatisfatório</button>
    `:""}

    ${estado==="avaliacao" ? `
      <button onclick="avaliar('sim')">✔ Atingiu</button>
      <button onclick="avaliar('nao')">❌ Não</button>
    `:""}

    <button id="prox" onclick="proximo()" disabled>➡️ Próximo</button>
  `;

  falar(estado);
}

// ---------------- CARD START ----------------

function iniciarCard(){
  document.getElementById("msg").innerText="";
  cardIniciado=true;
  iniciarTimer();
}

// ---------------- TIMER ----------------

function iniciarTimer(){

  tempoAtual=0;
  clearInterval(intervalo);

  intervalo=setInterval(()=>{
    tempoAtual+=100;

    let p=(tempoAtual/tempoTotal)*100;
    document.getElementById("barra").style.width=p+"%";

    if(tempoAtual>=tempoTotal){
      clearInterval(intervalo);
    }

  },100);
}

// ---------------- RESPOSTAS ----------------

function responder(resp){

  if(estado==="planejamento"){
    tentativa++;
  }

  if(estado==="monitoramento"){
    score.monitoramento = resp;
  }

  if(resp==="ok"){
    liberarProximo();
  } else {
    iniciarTimer(); // reinicia tempo
    liberarProximo();
  }
}

// ---------------- AVALIAÇÃO ----------------

function avaliar(resp){
  score.avaliacao = resp;
  liberarProximo();
}

// ---------------- CONTROLE ----------------

function liberarProximo(){

  let btn = document.getElementById("prox");

  if(estado==="planejamento"){
    if(tentativa >= 2){
      btn.disabled = false;
    }
  } else {
    btn.disabled = false;
  }
}

function proximo(){

  if(estado==="planejamento") estado="monitoramento";
  else if(estado==="monitoramento") estado="avaliacao";
  else if(estado==="avaliacao") estado="reflexao";

  cardIniciado=false;
  render();
}

// ---------------- REFLEXÃO ----------------

function gerarPergunta(){
  return score.avaliacao==="sim"
    ? "Sua compreensão é profunda?"
    : "O que você precisa melhorar?";
}

// ---------------- FINAL ----------------

function irScore(){
  estado="score";
  render();
}

function reiniciar(){
  estado="inicio";
  score={monitoramento:"",avaliacao:""};
  render();
}

// ---------------- QR ----------------

function scanQR(){

  const scanner=new Html5QrcodeScanner("reader",{fps:10,qrbox:250});

  scanner.render(txt=>{
    document.getElementById("msg").innerText=txt;
    falar(txt);
    scanner.clear();
  });
}

// ---------------- START ----------------

render();

</script>

</body>
</html>
