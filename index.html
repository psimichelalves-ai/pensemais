<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baralho Metacognitivo</title>

<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align:center; padding:20px; }
button { padding:15px; margin:10px; font-size:16px; border-radius:10px; }
.card { background:#f4f4f4; padding:20px; margin:20px; border-radius:15px; }
</style>
</head>

<body>

<h2>🧠 Baralho Metacognitivo</h2>
<div id="app"></div>

<script>

let estado = "inicio";
let tempo = 0;

// ---------------- RENDER ----------------
function render() {

  if (estado === "inicio") {
    app.innerHTML = `
      <div class="card">
      <h3>📘 Definir estudo</h3>
      Assunto:<br><input id="assunto"><br><br>
      Tempo (min):<br><input id="tempo" type="number"><br><br>
      <button onclick="iniciar()">Iniciar</button>
      </div>
    `;
  }

  if (estado === "planejamento") {
    app.innerHTML = `
      <div class="card">
      <h3>🟦 Planejamento</h3>
      <p>Selecione uma carta física</p>
      <button onclick="scanQR()">📷 Ler QR</button>
      <button onclick="iniciarTimer()">✔ Já selecionei</button>
      <div id="reader"></div>
      <p id="carta"></p>
      </div>
    `;
  }

  if (estado === "monitoramento") {
    app.innerHTML = `
      <div class="card">
      <h3>🟨 Monitoramento</h3>
      <button onclick="respostaMonitoramento('ok')">✔ Satisfatório</button>
      <button onclick="respostaMonitoramento('parcial')">⚠️ Parcial</button>
      <button onclick="respostaMonitoramento('ruim')">❌ Insatisfatório</button>
      </div>
    `;
  }

  if (estado === "avaliacao") {
    app.innerHTML = `
      <div class="card">
      <h3>🟩 Avaliação</h3>
      <button onclick="avaliar('sim')">✔ Atingiu</button>
      <button onclick="avaliar('parcial')">⚠️ Parcial</button>
      <button onclick="avaliar('nao')">❌ Não</button>
      </div>
    `;
  }
}

// ---------------- INÍCIO ----------------
function iniciar() {
  tempo = document.getElementById("tempo").value * 60000;
  estado = "planejamento";
  render();
}

// ---------------- TIMER ----------------
function iniciarTimer() {
  alert("⏱️ Estudo iniciado");
  setTimeout(() => {
    estado = "monitoramento";
    render();
  }, tempo);
}

// ---------------- MONITORAMENTO ----------------
function respostaMonitoramento(resp) {

  if (resp === "parcial" || resp === "ruim") {
    alert("⏱️ Novo ciclo de estudo");
    iniciarTimer();
  } else {
    estado = "avaliacao";
    render();
  }
}

// ---------------- AVALIAÇÃO ----------------
function avaliar(resp) {
  reflexaoAutomatica(resp);
}

// ---------------- REFLEXÃO ----------------
function reflexaoAutomatica(resp) {

  let perguntas = [];

  if (resp === "sim") {
    perguntas = [
      "Sua compreensão é profunda ou superficial?",
      "Você consegue explicar esse conteúdo com segurança?",
      "Existem partes que ainda não estão claras?",
      "Pode haver lacunas que você não percebeu?"
    ];
  } else {
    perguntas = [
      "O que você faria diferente para compreender melhor?",
      "O que precisa revisar primeiro?",
      "O que ainda precisa aprender?",
      "Qual é o próximo passo para avançar?"
    ];
  }

  let pergunta = perguntas[Math.floor(Math.random() * perguntas.length)];

  // voz
  let fala = new SpeechSynthesisUtterance(pergunta);
  speechSynthesis.speak(fala);

  alert("🧠 Reflexão:\n\n" + pergunta);

  estado = "inicio";
  render();
}

// ---------------- QR + VOZ ----------------
function scanQR() {

  const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });

  scanner.render((texto) => {

    document.getElementById("carta").innerText = texto;

    let fala = new SpeechSynthesisUtterance(texto);
    speechSynthesis.speak(fala);

    scanner.clear();
  });
}

// ---------------- SERVICE WORKER ----------------
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

render();

</script>

</body>
</html>
