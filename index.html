<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baralho Metacognitivo</title>
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:white;
}

.container {
  width:90%;
  max-width:400px;
  text-align:center;
}

.card {
  padding:25px;
  border-radius:20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

button {
  width:100%;
  padding:15px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  color:white;
}

.planejamento { background:#4A90E2; }
.monitoramento { background:#F5A623; }
.avaliacao { background:#7ED321; }
.reflexao { background:#8E44AD; }

input[type=range] {
  width:100%;
}
</style>
</head>

<body>

<div class="container">
  <div id="app" class="card"></div>
</div>

<script>

let estado = "inicio";
let tempo = 0;
let repetiu = false;

// ---------------- TELAS ----------------

function render() {

  if (estado === "inicio") {
    app.innerHTML = `
      <h2>📘 Início</h2>
      <p>Tempo de estudo: <b id="tempoLabel">10 min</b></p>
      <input type="range" min="5" max="60" value="10" onchange="atualizarTempo(this.value)">
      <button class="planejamento" onclick="irPlanejamento()">Iniciar</button>
    `;
  }

  if (estado === "planejamento") {
    app.innerHTML = `
      <h2>🟦 Planejamento</h2>
      <p>Selecione uma carta</p>
      <button onclick="scanQR()">📷 Ler QR</button>
      <button class="planejamento" onclick="iniciarTimer()">Continuar</button>
      <div id="reader"></div>
      <p id="carta"></p>
    `;
  }

  if (estado === "monitoramento") {
    app.innerHTML = `
      <h2>🟨 Monitoramento</h2>
      <button class="monitoramento" onclick="monitor('ok')">✔ Satisfatório</button>
      <button class="monitoramento" onclick="monitor('parcial')">⚠️ Parcial</button>
      <button class="monitoramento" onclick="monitor('ruim')">❌ Insatisfatório</button>
    `;
  }

  if (estado === "avaliacao") {
    app.innerHTML = `
      <h2>🟩 Avaliação</h2>
      <button class="avaliacao" onclick="avaliar('sim')">✔ Atingiu</button>
      <button class="avaliacao" onclick="avaliar('nao')">❌ Não atingiu</button>
    `;
  }

  if (estado === "reflexao") {
    app.innerHTML = `
      <h2>🧠 Reflexão</h2>
      <p id="pergunta"></p>
      <button class="reflexao" onclick="reiniciar()">Novo ciclo</button>
    `;
  }
}

// ---------------- CONTROLE ----------------

function atualizarTempo(valor) {
  document.getElementById("tempoLabel").innerText = valor + " min";
  tempo = valor * 60000;
}

function irPlanejamento() {
  estado = "planejamento";
  render();
}

// ---------------- TIMER ----------------

function iniciarTimer() {
  setTimeout(() => {
    estado = "monitoramento";
    render();
  }, tempo);
}

// ---------------- MONITORAMENTO ----------------

function monitor(resp) {

  if ((resp === "parcial" || resp === "ruim") && !repetiu) {
    repetiu = true;
    iniciarTimer(); // repete apenas 1 vez
  } else {
    estado = "avaliacao";
    render();
  }
}

// ---------------- AVALIAÇÃO ----------------

function avaliar(resp) {
  gerarReflexao(resp);
}

// ---------------- REFLEXÃO ----------------

function gerarReflexao(resp) {

  let perguntas = resp === "sim"
    ? [
        "Sua compreensão é profunda ou superficial?",
        "Você consegue explicar com segurança?",
        "Existem lacunas não percebidas?"
      ]
    : [
        "O que você faria diferente?",
        "O que precisa revisar primeiro?",
        "Qual é o próximo passo?"
      ];

  let p = perguntas[Math.floor(Math.random() * perguntas.length)];

  estado = "reflexao";
  render();

  setTimeout(() => {
    document.getElementById("pergunta").innerText = p;

    let fala = new SpeechSynthesisUtterance(p);
    speechSynthesis.speak(fala);
  }, 100);
}

// ---------------- RESET ----------------

function reiniciar() {
  repetiu = false;
  estado = "inicio";
  render();
}

// ---------------- QR ----------------

function scanQR() {
  const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });

  scanner.render((texto) => {
    document.getElementById("carta").innerText = texto;

    let fala = new SpeechSynthesisUtterance(texto);
    speechSynthesis.speak(fala);

    scanner.clear();
  });
}

// ---------------- SERVICE WORKER ----------------

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

render();

</script>

</body>
</html>
