<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baralho Metacognitivo</title>

<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --fontSize: 18px; }

body {
  margin:0;
  font-family: Arial;
  font-size: var(--fontSize);
  background:#1e3c72;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container { width:100%; max-width:420px; text-align:center; }

.card {
  width:80%;
  margin:auto;
  padding:30px;
  border-radius:20px;
  min-height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  cursor:pointer;
}

button {
  width:80%;
  padding:15px;
  margin:10px auto;
  display:block;
  border:none;
  border-radius:12px;
  font-weight:bold;
  color:white;
}

.planejamento { background:#4A90E2; }
.monitoramento { background:#F5A623; }
.avaliacao { background:#7ED321; }
.reflexao { background:#8E44AD; }

.progress {
  width:80%;
  height:6px;
  background:#ccc;
  margin:10px auto;
  border-radius:5px;
}

.bar { height:100%; width:0%; background:white; }
</style>
</head>

<body>

<div class="container">
  <div id="app"></div>
</div>

<script>

let estado = "inicio";
let tempoTotal = localStorage.getItem("tempo") || 5 * 60000;
let repetiu = false;
let tentativaPlanejamento = 0;

let intervalo;
let tempoAtual = 0;

let score = { monitoramento:"", avaliacao:"" };

// ---------------- VOZ ----------------

function falar(texto){
  speechSynthesis.speak(new SpeechSynthesisUtterance(texto));
}

// ---------------- RENDER ----------------

function render(){

if(estado==="inicio"){
  app.innerHTML = `
    <h2>⚙️ Configuração</h2>

    <button onclick="lerTela()">🔊 Ouvir tela</button>

    <p>Fonte</p>
    <input type="range" min="14" max="28" value="${localStorage.getItem('fonte')||18}"
    onchange="setFonte(this.value)">

    <p>Tempo: <span id="tempoLabel">${tempoTotal/60000} min</span></p>
    <input type="range" min="1" max="20" value="${tempoTotal/60000}"
    onchange="setTempo(this.value)">

    <button class="planejamento" onclick="irPlanejamento()">Iniciar</button>
  `;
}

if(["planejamento","monitoramento","avaliacao"].includes(estado)){
  telaCard();
}

if(estado==="reflexao"){
  let p = gerarPergunta();

  app.innerHTML=`
    <h2>🧠 Reflexão</h2>
    <div class="card reflexao">${p}</div>
    <button onclick="mostrarScore()">Continuar</button>
  `;

  falar(p);
}

if(estado==="score"){
  app.innerHTML=`
    <h2>🏆 Resultado</h2>
    <p>Monitoramento: ${score.monitoramento}</p>
    <p>Avaliação: ${score.avaliacao}</p>
    <button onclick="reiniciar()">Novo ciclo</button>
  `;
}

}

// ---------------- CONFIG ----------------

function lerTela(){
  falar("Configuração. Ajuste fonte e tempo de estudo.");
}

function setFonte(v){
  document.documentElement.style.setProperty('--fontSize', v+"px");
  localStorage.setItem("fonte", v);
}

function setTempo(v){
  tempoTotal = v * 60000;
  document.getElementById("tempoLabel").innerText = v+" min";
  localStorage.setItem("tempo", tempoTotal);
}

// ---------------- FLUXO ----------------

function irPlanejamento(){
  estado="planejamento";
  tentativaPlanejamento=0;
  render();
}

// ---------------- CARD ----------------

function telaCard(){

  let cor = estado;

  app.innerHTML=`
    <h2>${estado.toUpperCase()}</h2>

    <div class="progress"><div class="bar" id="barra"></div></div>

    <div class="card ${cor}" onclick="iniciarCard()">
      <p id="msg">Clique para escolher uma carta</p>
    </div>

    <button onclick="scanQR()">📷 Ler QR</button>

    ${estado==="monitoramento" ? `
      <button onclick="monitor('ok')">✔ Satisfatório</button>
      <button onclick="monitor('parcial')">⚠️ Parcial</button>
      <button onclick="monitor('ruim')">❌ Insatisfatório</button>
    `:""}

    ${estado==="avaliacao" ? `
      <button onclick="avaliar('sim')">✔ Atingiu</button>
      <button onclick="avaliar('nao')">❌ Não</button>
    `:""}

    <button id="btnProx" style="display:none" onclick="proximo()">➡️ Próximo</button>
  `;
}

// ---------------- TIMER ----------------

function iniciarCard(){
  document.getElementById("msg").innerText="";
  iniciarTimer();
}

function iniciarTimer(){
  tempoAtual=0;
  clearInterval(intervalo);

  intervalo=setInterval(()=>{
    tempoAtual+=100;
    let p=(tempoAtual/tempoTotal)*100;
    document.getElementById("barra").style.width=p+"%";

    if(tempoAtual>=tempoTotal){
      clearInterval(intervalo);
    }

  },100);
}

// ---------------- MONITORAMENTO ----------------

function monitor(resp){

  score.monitoramento=resp;

  if(estado==="planejamento"){
    tentativaPlanejamento++;
  }

  if((resp==="parcial"||resp==="ruim") && !repetiu){
    repetiu=true;
    iniciarTimer();
  } else {
    mostrarProximo();
  }
}

// ---------------- AVALIAÇÃO ----------------

function avaliar(resp){
  score.avaliacao=resp;
  mostrarProximo();
}

// ---------------- CONTROLE ----------------

function mostrarProximo(){

  let btn=document.getElementById("btnProx");

  if(estado==="planejamento"){
    if(tentativaPlanejamento>=1 || score.monitoramento==="ok"){
      btn.style.display="block";
    }
  } else {
    btn.style.display="block";
  }
}

function proximo(){

  if(estado==="planejamento") estado="monitoramento";
  else if(estado==="monitoramento") estado="avaliacao";
  else if(estado==="avaliacao") estado="reflexao";

  repetiu=false;
  render();
}

// ---------------- REFLEXÃO ----------------

function gerarPergunta(){
  let arr = score.avaliacao==="sim"
    ? ["Você realmente dominou o conteúdo?","Há lacunas?"]
    : ["O que melhorar?","Qual próximo passo?"];

  return arr[Math.floor(Math.random()*arr.length)];
}

// ---------------- RESET ----------------

function mostrarScore(){ estado="score"; render(); }

function reiniciar(){
  estado="inicio";
  repetiu=false;
  score={monitoramento:"",avaliacao:""};
  render();
}

// ---------------- QR ----------------

function scanQR(){
  const scanner=new Html5QrcodeScanner("reader",{fps:10,qrbox:250});
  scanner.render(txt=>{
    document.getElementById("msg").innerText=txt;
    falar(txt);
    scanner.clear();
  });
}

// ---------------- INIT ----------------

render();

</script>

</body>
</html>
